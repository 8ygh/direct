<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Redirecting...</title>

<style>
:root{
--primary:#6366f1;
--accent:#a855f7;
--bg-dark:#01000d;
--glass:rgba(255,255,255,0.03);
--glass-border:rgba(255,255,255,0.1);
--text-main:#f8fafc;
--text-dim:#64748b;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
background:var(--bg-dark);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:var(--text-main);
overflow:hidden;
}

/* background stars */

#bg-canvas{
position:fixed;
inset:0;
z-index:-1;
}

/* card */

.card{
background:var(--glass);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border-radius:28px;
padding:60px 40px;
width:90%;
max-width:420px;
text-align:center;

box-shadow:
0 0 0 1px var(--glass-border),
0 25px 50px -12px rgba(0,0,0,0.6);
}

/* spinner */

.spinner{
width:55px;
height:55px;
margin:auto;
border-radius:50%;
border:3px solid transparent;
border-top-color:var(--primary);
border-right-color:var(--accent);
animation:spin 0.8s linear infinite;
margin-bottom:25px;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

h1{
font-size:1.3rem;
font-weight:600;
letter-spacing:-0.02em;
margin-bottom:8px;
}

.subtitle{
font-size:0.8rem;
color:var(--text-dim);
letter-spacing:.1em;
text-transform:uppercase;
}

/* logo */

.logo{
width:80px;
height:80px;
border-radius:24px;
margin-bottom:25px;
border:1px solid rgba(255,255,255,0.1);
}

</style>
</head>

<body>

<canvas id="bg-canvas"></canvas>

<div class="card">

<img class="logo" src="https://github.com/8ygh/global/releases/download/icon/icon.png">

<div class="spinner"></div>

<h1>Redirecting to Direct Install</h1>
<div class="subtitle">Please wait...</div>

</div>

<script>

/* star background */

const canvas=document.getElementById("bg-canvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let stars=[];

for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*1.5,
a:Math.random(),
s:Math.random()*0.01+0.002
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(star=>{
star.a+=star.s;
if(star.a<=0||star.a>=1) star.s*=-1;

ctx.beginPath();
ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
ctx.fillStyle=`hsla(270,80%,80%,${star.a})`;
ctx.fill();
});

requestAnimationFrame(animate);
}

animate();

/* redirect */

setTimeout(()=>{
window.location.href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/8ygh/global/refs/heads/main/Oilwell.plist";
},1500);

</script>

</body>
</html>
